services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: defaultdb
    volumes:
      - ./database/init_postgre.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  # Redis (Valkey)
  redis:
    image: redis:alpine


  # .NET 
  api:
    image: ghcr.io/soniklvl/autoparts-api:${IMAGE_TAG}
    ports:
      - "${API_PORT}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgresConnection=Host=db;Port=5432;Database=defaultdb;Username=admin;Password=password;
      - ConnectionStrings__RedisConnection=redis:6379
    depends_on:
      - db
      - redis

  #  React 
  web:
    image: ghcr.io/soniklvl/autoparts-web:${IMAGE_TAG}
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api

volumes:
  pgdata: